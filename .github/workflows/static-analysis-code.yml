name: Static Code Review

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar el entorno de PHP con las extensiones necesarias
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Cambia esto a tu versión de PHP si usas la 8.1 u 8.3
          extensions: mbstring, xml, ctype, iconv, mysql, bcmath
          coverage: none

      # 3. Crear el archivo de entorno para pruebas
      - name: Copy .env file
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      # 4. INSTALAR DEPENDENCIAS (Este paso SIEMPRE debe ir antes de usar php artisan)
      - name: Install dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # 5. Generar la clave de la aplicación Laravel
      - name: Generate Application Key
        run: php artisan key:generate

      # 6. Configurar la base de datos y correr migraciones
      - name: Set up the database
        run: php artisan migrate --env=testing
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: ""

      # 7. Ejecutar Pruebas Unitarias / Integración
      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: ""

      # 8. Validar Estilo de Código (Laravel Pint)
      - name: Run Laravel Pint
        run: vendor/bin/pint --test

      # 9. Análisis Estático Avanzado (PHPStan / Larastan)
      - name: Run PHPStan (Larastan)
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon